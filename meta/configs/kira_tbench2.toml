# Meta-Harness optimization config for KIRA on TerminalBench-2
# 89 tasks, all difficulties
# NOTE: No resource overrides — matches leaderboard submission requirements

[experiment]
name = "kira-tbench2"
harness_root = ".."
output_dir = "../runs/kira-tbench2"
max_iterations = 10
n_trials_search = 1
n_trials_final = 5
n_canaries = 5
regression_tolerance = 1
model = "anthropic/claude-opus-4-6"
proposer_model = "anthropic/claude-sonnet-4-6"
environment = "modal"
max_episodes = 20
concurrency = 89

